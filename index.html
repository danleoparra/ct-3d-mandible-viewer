<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Interactive 3D CT Reconstruction</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      text-align: center;
    }

    header {
      padding: 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    p {
      font-size: 14px;
      margin: 8px 20px;
    }

    model-viewer {
      width: 100%;
      height: 80vh;
      background-color: #ffffff;
    }

    footer {
      padding: 10px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <header>
    <h1>Interactive 3D CT Reconstruction</h1>
    <p>Use mouse or touchscreen gestures to rotate, zoom, and inspect the model.</p>
  </header>

  <model-viewer
    src="mandible_model.glb"
    alt="Interactive 3D reconstruction generated from computed tomography"
    camera-controls
    auto-rotate
    interaction-prompt="auto"
    shadow-intensity="0.8"
    exposure="1">
  </model-viewer>

  <footer>
    3D reconstruction generated from CT segmentation. The model is provided for scientific visualization.
  </footer>

</body>
</html>
